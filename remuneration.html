<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probate Calculator</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #1a365d; /* Professional deep navy */
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.25rem;
            color: var(--primary-color);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 0.85rem;
            color: #666;
            margin: 5px 0 0 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--primary-color);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper::before {
            content: "$";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 12px 12px 28px;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #f8fafc;
            -moz-appearance: textfield;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .results {
            margin-top: 25px;
            border-top: 1px dashed var(--border-color);
            padding-top: 15px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .result-row.total {
            font-weight: bold;
            font-size: 1.15rem;
            border-top: 1px solid var(--primary-color);
            padding-top: 10px;
            margin-top: 10px;
            color: var(--primary-color);
        }

        .value {
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Administration & Probate</h1>
        <p>Rules 2023 Statutory Scale Calculator</p>
    </div>

    <div class="form-group">
        <label for="grossValue">Gross Value of Global Estate</label>
        <div class="input-wrapper">
            <input type="number" id="grossValue" placeholder="0.00" inputmode="decimal" oninput="calculateAll()">
        </div>
    </div>

    <div class="form-group">
        <label for="vicValue">Gross Value of Victorian Assets</label>
        <div class="input-wrapper">
            <input type="number" id="vicValue" placeholder="0.00" inputmode="decimal" oninput="calculateAll()">
        </div>
    </div>

    <div class="results">
        <div class="result-row">
            <span>Solicitor Remuneration:</span>
            <span class="value" id="remunerationOut">$0.00</span>
        </div>
        <div class="result-row">
            <span>Probate Filing Fee:</span>
            <span class="value" id="filingFeeOut">$0.00</span>
        </div>
        <div class="result-row total">
            <span>Total Estimated Cost:</span>
            <span class="value" id="totalOut">$0.00</span>
        </div>
    </div>
</div>

<script>
function calculateAll() {
    // Read inputs, fallback to 0 if empty
    const grossValue = parseFloat(document.getElementById('grossValue').value) || 0;
    const vicValue = parseFloat(document.getElementById('vicValue').value) || 0;

    let remuneration = 0;
    let filingFee = 0;

    // 1. Calculate Solicitor Remuneration (Your exact ladder logic)
    switch (true) {
        case (grossValue <= 0):      remuneration = 0; break;
        case (grossValue <= 10000):  remuneration = 213; break;
        case (grossValue <= 12000):  remuneration = 246; break;
        case (grossValue <= 14000):  remuneration = 283; break;
        case (grossValue <= 16000):  remuneration = 318; break;
        case (grossValue <= 18000):  remuneration = 354; break;
        case (grossValue <= 20000):  remuneration = 391; break;
        case (grossValue <= 30000):  remuneration = 425; break;
        case (grossValue <= 40000):  remuneration = 463; break;
        case (grossValue <= 50000):  remuneration = 499; break;
        case (grossValue <= 60000):  remuneration = 535; break;
        case (grossValue <= 70000):  remuneration = 572; break;
        case (grossValue <= 80000):  remuneration = 608; break;
        case (grossValue <= 90000):  remuneration = 644; break;
        case (grossValue <= 100000): remuneration = 680; break;
        default:
            // "Part thereof" logic handled gracefully via Math.ceil
            const excess = grossValue - 100000;
            const blocks = Math.ceil(excess / 50000);
            remuneration = 680 + (blocks * 35);
    }

    // 2. Calculate Victorian Supreme Court Filing Fees (Current 2025/2026 Scale)
    switch (true) {
        case (vicValue <= 250000):   filingFee = 0; break;
        case (vicValue <= 500000):   filingFee = 386.10; break;
        case (vicValue <= 1000000):  filingFee = 656.40; break;
        case (vicValue <= 2000000):  filingFee = 1445.40; break;
        case (vicValue <= 5000000):  filingFee = 2365.10; break;
        default:                     filingFee = 3855.40;
    }

    // 3. Render Outputs formatted as local currency
    document.getElementById('remunerationOut').innerText = formatCurrency(remuneration);
    document.getElementById('filingFeeOut').innerText = formatCurrency(filingFee);
    document.getElementById('totalOut').innerText = formatCurrency(remuneration + filingFee);
}

function formatCurrency(amount) {
    if (amount === 0) return "$0.00";
    return "$" + amount.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
}
</script>

</body>
</html>
